name: refresh-x-days

# Daily refresh of apps/web/src/data/x-days.{slug}.json from socialdata.tools.
# Iterates every user in apps/web/src/config/users.json and commits all
# changed files back to main, which triggers a Vercel rebuild.
#
# Schedule: 09:00 UTC ≈ 01:00 PST / 02:00 PDT (the exact local time drifts
# with US DST — both are well past midnight PT so the prior day's tweets
# are settled by then).
on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-x-days
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN has contents: write per the top-level permissions
          # block above; that's enough to push back to the default branch
          # for repos without branch-protection rules requiring a PAT.
          token: ${{ secrets.GITHUB_TOKEN }}

      # F6: SHA-pin third-party action so a moving major tag can't pull in
      # a malicious commit during a run that already has GITHUB_TOKEN and
      # SOCIALDATA_API_KEY in scope. The pinned SHA is pnpm/action-setup v3.0.0.
      # Version comes from package.json's "packageManager" field; do NOT
      # also pass `with: version:` here or pnpm/action-setup refuses both.
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda  # v3.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: refresh x-days
        env:
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          # Multi-user mode (D-030): the script reads the roster from
          # apps/web/src/config/users.json and refreshes one bundled file per
          # user (x-days.{slug}.json). Leave X_LOGIN UNSET so the legacy
          # single-user override path isn't taken.
          # Fetch only the most recent tweet per user each run
          # (~1 API call per user, ~$0.0002). Additive merge — historical
          # days never decrement. Heatmap fills out one day at a time as a
          # binary "did you ship that day?" signal.
          LATEST_ONLY: "1"
        run: pnpm tsx scripts/refresh-x-days.ts

      - name: commit if changed
        id: commit
        run: |
          # Multi-user: any per-slug data file may have changed. Use the
          # directory-level diff so a single user's update still triggers a
          # commit, and a no-op across all users still cleanly skips.
          if git diff --quiet apps/web/src/data/; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # F8b: author the bot commit as the repo owner's GitHub noreply
          # address (not the generic noreply@github.com). The generic address
          # maps to GitHub's catch-all `web-flow` user, which has no Vercel
          # account linked → Vercel rejects the push-triggered deploy with
          # "Git author web-flow must have access to the project on Vercel".
          # The numeric-prefixed form `<id>+<login>@users.noreply.github.com`
          # resolves to the actual user on GitHub, which IS linked to Vercel,
          # so the push-triggered deploy is accepted.
          # The deploy-hook step below remains as belt-and-braces in case
          # Vercel's git integration is ever disconnected.
          git config user.name "x-refresh-bot"
          git config user.email "14373068+anishthite@users.noreply.github.com"
          # Stage only the x-days payload files — if anything else in the
          # data/ dir changed accidentally, we don't want to drag it along.
          git add apps/web/src/data/x-days.*.json
          # F7: rebase any in-flight changes on the branch before commit/push
          # to avoid losing a queued-schedule run's work to a non-fast-forward
          # rejection after a finishing workflow_dispatch. The data file is
          # regenerated from scratch each run with overlap-merge logic, so
          # replaying our result on top of a newer base yields the same
          # authoritative state.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git commit -m "data: refresh x-days $(date -u +%Y-%m-%d)"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # F8: trigger Vercel via Deploy Hook instead of relying on Vercel's
      # git-push auto-deploy. The bot's commit author ("x-refresh-bot" /
      # noreply@github.com) maps to GitHub's catch-all `web-flow` user, which
      # has no Vercel account linked, so Vercel's "deploy only commits from
      # authors with project access" check refuses the push-triggered build.
      # Deploy hooks bypass author attribution entirely — the hook URL itself
      # is the auth. Create one at:
      #   Vercel → Project → Settings → Git → Deploy Hooks → Create hook
      #   (branch: main, name: refresh-x-days-bot)
      # then store the URL as the `VERCEL_DEPLOY_HOOK_URL` repo secret.
      - name: trigger vercel deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret not set; skipping deploy trigger."
            echo "Set it in repo Settings → Secrets and variables → Actions."
            exit 0
          fi
          # Hook URL is project- and branch-scoped; no body needed. Use -f so
          # a non-2xx response fails the job (loud signal that the hook was
          # deleted/rotated). -sS keeps output quiet on success but shows
          # errors. We discard the JSON ack body and just print the status.
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL" \
            -o /dev/null \
            -w "vercel deploy hook: HTTP %{http_code}\n"
